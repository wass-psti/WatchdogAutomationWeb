<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watchdogs Automation</title>

  <style>
    body { margin: 0; }

    #splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #FF6D05;
    }

    #splash img {
      width: min(520px, 85vw);
      height: auto;
    }
  </style>
</head>

<body>
  <div id="splash">
    <img src="./assets/images/WatchdogAutomationHeader.png"
         alt="Watchdogs Automation" />
  </div>

  <script>
    (function () {
      const MIN_MS = 2200;        // splash duration
      const TARGET_URL = "home.html";

      const splash = document.getElementById("splash");
      const start = performance.now();

      function go() {
        const elapsed = performance.now() - start;
        const remaining = Math.max(0, MIN_MS - elapsed);

        setTimeout(() => {
          // fade
          splash.style.transition = "opacity 300ms ease";
          splash.style.opacity = "0";

          // redirect after fade
          setTimeout(() => {
            window.location.href = TARGET_URL;
          }, 320);
        }, remaining);
      }

      // start timing immediately (doesn't depend on load speed)
      go();

      // if browser restores from back/forward cache, force a fresh run
      window.addEventListener("pageshow", (e) => {
        if (e.persisted) window.location.reload();
      });
    })();
  </script>
</body>
</html>
